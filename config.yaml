@app.route('/savescheduler', methods=['POST'])
def webserver_save_scheduler():
    sid = request.form.get('id')
    folder = request.form.get('schedulerfolder')
    field_name = 'your_field_name'
    field_value = 'your_field_value'
    update_json_file(sid, field_name, field_value, folder)
    return redirect('main')
