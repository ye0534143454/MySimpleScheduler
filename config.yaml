---
version: "2.7.2"
name: Simple Scheduler
description: Simple timer on weekly base
def load_json_schedulers():
    ss = []
    os.chdir(simpleschedulerconf.json_folder)
    for folder in os.listdir(simpleschedulerconf.json_folder):
        if os.path.isdir(folder):
            for file in glob.glob(os.path.join(folder, '*.json')):
                with open(file, 'r') as read_file:
                    try:
                        ss.append(json.load(read_file))
                    except:
                        printlog('ERROR: scheduler file %s is corrupted' % file)
    return ss

init: false
homeassistant_api: true
ingress: true
panel_admin: false
panel_title: Scheduler
panel_icon: mdi:calendar-clock
map:
  - share:rw

def update_json_file(object_id, field_name, field_value, folder=''):
    if folder:
        folder_path = os.path.join(simpleschedulerconf.json_folder, folder)
        if not os.path.exists(folder_path):
            os.makedirs(folder_path)
        file = os.path.join(folder_path, object_id + '.json')
    else:
        file = simpleschedulerconf.json_folder + object_id + '.json'
    try:
        if os.path.exists(file):
            with open(file, 'r') as jsonFile:
                data = json.load(jsonFile)
            data[field_name] = field_value
            with open(file, 'w') as jsonFile:
                json.dump(data, jsonFile)
    except:
        printlog('ERROR: Unable to update JSON file')
    return True

